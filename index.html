<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Aurora Tutor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 50px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      margin: 10px 0;
      padding: 14px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }

    .primary {
      background: #6366f1;
      color: white;
    }

    .primary:hover {
      background: #4f46e5;
    }

    .secondary {
      background: #334155;
      color: white;
    }

    .secondary:hover {
      background: #475569;
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Aurora Tutor</h1>
    <p>Sito ufficiale – Privacy e Supporto</p>

    <a href="privacy.html" class="btn primary">Privacy Policy</a>
    <a href="supporto.html" class="btn secondary">Supporto & FAQ</a>
    <a href="elimina-account.html" class="btn secondary">Elimina Account</a>

    <footer>
      © 2026 Aurora Tutor. Tutti i diritti riservati.
    </footer>
  </div>
</body>
</html>
